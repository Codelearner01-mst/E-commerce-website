<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce website</title>
    <link rel="stylesheet" href="../styles/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <header
      id="header-bar"
      class="fixed top-0 left-0 right-0 bg-white/90 border-gray-100 flex justify-between items-center px-4 md:px-8 py-4 z-50 transition-all duration-300"
    >
      <h1
        class="text-black text-2xl md:text-3xl font-serif tracking-widest uppercase"
      >
        Vision Jewelry
      </h1>
    </header>
    <main class="pt-28 bg-gray-50 pb-20 mt-24">
      <div class="mt-8 mb-16 px-4">
        <div
          class="bg-blue-50 rounded-lg p-8 border-l-4 border-blue-400 text-center max-w-2xl mx-auto"
        >
          <h2 class="text-3xl md:text-4xl font-serif font-medium text-gray-900">
            Shop Collection
          </h2>
          <p class="text-gray-500 text-sm mt-2">
            Explore our complete range of exquisite, handcrafted jewelry.
          </p>
        </div>
      </div>
      <section id="products" class="px-4 mt-5 py-12 bg-gray-50">
        <div class="max-w-7xl mx-auto">
          <div
            id="product-list"
            class="product-list grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12 mb-16 px-4 md:px-0"
          ></div>
        </div>
      </section>
      <div
        aria-live="polite"
        class="update-cart-success bg-gradient-to-r from-amber-200 to-amber-100 fixed top-0 left-0 z-[100] transition-all duration-300 ease-in-out border-b border-amber-300 w-full shadow-md opacity-0 -translate-y-full pointer-events-none"
        role="alert"
      >
        <p
          class="text-amber-900 font-semibold text-center py-3 text-lg flex items-center justify-center gap-2"
        >
          <i class="fa-solid fa-check-circle text-green-600"></i> Cart updated
          successfully!
        </p>
      </div>
    </main>
    <footer id="footer" class="bg-gray-900 text-gray-400 py-14 px-5"></footer>
  </body>
  <script type="module" src="shop.js" defer></script>
</html>
