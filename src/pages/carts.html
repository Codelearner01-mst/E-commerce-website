<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce website</title>
  <link rel="stylesheet" href="../styles/output.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
  <header id="header-bar"
    class="fixed top-0 left-0 right-0 bg-white/90 border-gray-100 flex justify-between items-center px-4 md:px-8 py-4 z-50 transition-all duration-300">
    <h1 class="text-black text-2xl md:text-3xl font-serif tracking-widest uppercase">
      Vision Jewelry
    </h1>
  </header>
  <main>
    <div class="mt-20 bg-gray-100 font-medium">
      <h2 class="text-xl py-5 ml-3.5">Shopping Cart</h2>
    </div>
    <div class="lg:flex lg:gap-12 lg:max-w-7xl lg:mx-auto xl:px-8 px-4">
      <section class="mt-18 lg:w-2/3 w-full">
        <div class="carts">
          <div class="flex items-center flex-row gap-3 ml-3.5 font-medium border-b border-gray-200 pb-4">
            <h3>PRODUCT</h3>
            <h3 class="ml-8">QUANTITY</h3>
            <h3>TOTAL</h3>
          </div>
          <div id="carts-list" class="flex gap-13 flex-col mt-13 mb-15">
            <p id="empty-cart-message" class="text-center text-gray-500 hidden">
              Your cart is empty.
            </p>
          </div>
        </div>
      </section>
      <section class="mb-12 lg:w-1/3 w-full lg:mt-32 xl:mt-40">
        <div id="result-container" class="bg-yellow-100 mx-auto hidden lg:mx-0 w-full rounded-md shadow-sm">
          <div class="flex flex-col gap-5 p-6.5 w-full">
            <h3 class="">CART TOTAL</h3>
            <div class="flex items-center justify-between">
              <p class="">Subtotal</p>
              <p id="subtotal-amount" class="text-yellow-700 font-medium">
                $0.00
              </p>
            </div>
            <div class="flex items-center justify-between">
              <p class="">Total</p>
              <p id="total-amount" class="text-yellow-700 font-medium">$0.00</p>
            </div>
            <button id="checkout-btn"
              class="w-full bg-black font-sans text-white px-4 py-3 mt-3.5 mb-1.5 hover:bg-gray-800 transition rounded-sm">
              PROCEED TO CHECKOUT
            </button>
          </div>
        </div>
      </section>
    </div>
    <div aria-live="polite"
      class="update-cart-success bg-gradient-to-r from-amber-200 to-amber-100 fixed top-0 left-0 z-[100] transition-all duration-300 ease-in-out border-b border-amber-300 w-full shadow-md opacity-0 -translate-y-full pointer-events-none"
      role="alert">
      <p class="text-amber-900 font-semibold text-center py-3 text-lg flex items-center justify-center gap-2">
        <i class="fa-solid fa-check-circle text-green-600"></i> Cart updated
        successfully!
      </p>
    </div>
  </main>
  <footer id="footer" class="bg-gray-900 text-gray-100 py-12 px-4"></footer>
</body>
<script type="module" src="./carts.js"></script>

</html>
