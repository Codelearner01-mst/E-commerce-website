<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce website</title>
  <link rel="stylesheet" href="../styles/output.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
  <header id="header-bar" class="fixed top-0 left-0 right-0 bg-white flex justify-between items-center px-2 py-5.5 z-50">
    <h1
      class="text-black text-[1.7rem] font-bold sm:ml-15 md:text-2xl md:ml-7 lg:text-[1.8rem] lg:ml-8 xl:text-[1.8rem] xl:ml-15">
      Vision jewelry
    </h1>
    
  </header>
  <main>
    <div>
      <h2>Product Details</h2>
    </div>
    <section>
      <div id="product-container" class=" product-container px-2 mb-10 ">

      </div>
      </div>
    </section>
    <div aria-live="polite"
      class="added-cart-success bg-gradient-to-r from-amber-200 to-amber-100 fixed top-0 left-0 z-[100] transition-all duration-300 ease-in-out border-b border-amber-300 w-full shadow-md opacity-0 -translate-y-full pointer-events-none"
      role="alert">
      <p class="text-amber-900 font-semibold text-center py-3 text-lg flex items-center justify-center gap-2">
        <i class="fa-solid fa-check-circle text-green-600"></i> Item added to cart!
      </p>
    </div>
  </main>

  <footer id="footer" class="bg-gray-900 text-gray-100 py-12 px-4"></footer>
</body>
<script type="module" src="./product.js"></script>

</html>
